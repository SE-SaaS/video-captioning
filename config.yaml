# Single source of truth for the pipeline. Every tunable lives here; nothing is hardcoded.

# Candidate caption models. ONE entry -> single-model mode (no judge). TWO OR MORE
# entries -> ensemble: every model captions each style, then Judge produces the final one.
Models:
  # SINGLE-MODEL graded config: one model, no judge. Chosen because the graded run uses
  # our own 10 RPM Fireworks key under a hard 10-min limit — an ensemble (~4 calls/caption)
  # can't finish in time, but one call/caption (~48-60 total) fits comfortably.
  # qwen3p7-plus scored 0.971 in local single-model testing (best of the candidates).
  - Provider: fireworks
    Id: "accounts/fireworks/models/qwen3p7-plus"
    BaseUrl: "https://api.fireworks.ai/inference/v1"
    Temperature: 0.4         # fallback, used only if a style is missing from StyleTemperatures
    MaxTokens: 4000
    ReasoningEffort: none    # none | low | medium | high — 'none' disables thinking
  # Add more models here to enable ensembling. The API key env var is derived from
  # Provider (fireworks -> FIREWORKS_API_KEY, google -> GEMINI_API_KEY). Gemini works
  # through its OpenAI-compatible endpoint:
  # - Provider: google
  #   Id: "gemini-3.5-flash"
  #   BaseUrl: "https://generativelanguage.googleapis.com/v1beta/openai"
  #   Temperature: 0.4
  #   MaxTokens: 2000
  #   ReasoningEffort: none

# Judge LLM: only used when Models has 2+ entries. Picks the best candidate caption
# or merges their best parts into one final caption per style.
Judge:
  Provider: fireworks
  Id: "accounts/fireworks/models/qwen3p7-plus"
  BaseUrl: "https://api.fireworks.ai/inference/v1"
  Temperature: 0.3
  MaxTokens: 4000
  ReasoningEffort: none
  PassFrames: true           # true = also send the video frames to the judge; false = captions only

# Per-style sampling temperature: low = precise/factual, high = creative/varied.
StyleTemperatures:
  formal: 0.1
  sarcastic: 0.8
  humorous_tech: 0.9
  humorous_non_tech: 0.9

Frames:
  # Clips are strictly 30s-2min. Sample PerThirtySeconds frames per 30s of duration,
  # across the whole clip, clamped to MaxTotal.
  PerThirtySeconds: 7
  MaxTotal: 30            # hard-clamped to 30 in code (Fireworks per-request image limit)
  Width: 512             # downscale longest edge, keeps payload + latency low
  JpegQuality: 85
  Strategy: uniform       # uniform | keyframe
  MaxPayloadMB: 9.0       # safety guard under Fireworks' 10MB total-base64 limit
  Source: stream          # stream (ffmpeg reads the URL) | download (fetch full clip first)
  EnableFallback: true    # if the primary Source fails, automatically try the other way

Client:
  TimeoutSeconds: 30
  MaxRetries: 3
  BackoffSeconds: 2.0
  # Global min seconds between EVERY API call (all threads share it). 0 = no throttle.
  # Track 2 graded run uses OUR OWN Fireworks key, which is capped at 10 RPM (no payment
  # method). 6.5s spacing keeps us safely under that. Single-model = ~48-60 calls, so the
  # run finishes in ~5-6.5 min, well within the 10-min hard limit. Set to 0 if you add a
  # payment method (6000 RPM) and switch back to the ensemble.
  MinRequestIntervalSeconds: 6.5

Runtime:
  MaxWorkers: 6           # concurrent (task, style) captioning units

Paths:
  # Auto-selected at load time: Docker set inside a container (/.dockerenv present), Local otherwise.
  Docker:
    Input: "/input/tasks.json"
    Output: "/output/results.json"
    WorkDir: "/tmp/VideoCaptioning"
  Local:
    Input: "io/input/tasks.json"
    Output: "io/output/results.json"
    WorkDir: "io/work"

DefaultStyles:
  - formal
  - sarcastic
  - humorous_tech
  - humorous_non_tech
